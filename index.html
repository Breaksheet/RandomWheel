<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🎡 Spin the Wheel!</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;800&display=swap" rel="stylesheet"/>

  <!-- ============================================================
       FIREBASE SETUP
       Replace the values below with YOUR project's config.
       console.firebase.google.com → Project Settings → SDK setup
       ============================================================ -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getDatabase, ref, push, onValue, query, limitToLast }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    // ⬇⬇⬇  PASTE YOUR FIREBASE CONFIG HERE  ⬇⬇⬇
    const firebaseConfig = {
      apiKey:            "YOUR_API_KEY",
      authDomain:        "YOUR_PROJECT_ID.firebaseapp.com",
      databaseURL:       "https://YOUR_PROJECT_ID-default-rtdb.firebaseio.com",
      projectId:         "YOUR_PROJECT_ID",
      storageBucket:     "YOUR_PROJECT_ID.appspot.com",
      messagingSenderId: "YOUR_SENDER_ID",
      appId:             "YOUR_APP_ID"
    };
    // ⬆⬆⬆  PASTE YOUR FIREBASE CONFIG HERE  ⬆⬆⬆

    const configured = !firebaseConfig.apiKey.includes("YOUR_");

    if (configured) {
      const app = initializeApp(firebaseConfig);
      const db  = getDatabase(app);

      window._fbSaveResult = (name) => {
        push(ref(db, "results"), { name, timestamp: Date.now() });
      };

      const recent = query(ref(db, "results"), limitToLast(10));
      onValue(recent, (snapshot) => {
        const data = snapshot.val();
        if (!data) return;
        const list = Object.values(data).reverse();
        window._fbRenderCloud(list);
      });

    } else {
      window._fbSaveResult  = () => {};
      window._fbRenderCloud = () => {};
    }
  </script>

  <style>
    :root {
      --bg:     #0f0c1a;
      --surf:   #1e1133;
      --surf2:  #2a1650;
      --bord:   rgba(255,255,255,0.08);
      --gold:   #ffd84d;
      --gold-d: #e6a800;
      --pink:   #ff4f9a;
      --cyan:   #00e5ff;
      --text:   #f0e6ff;
      --muted:  #9b7ec8;
      --radius: 14px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; }

    body {
      font-family: 'Nunito', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    .bg-layer {
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background:
        radial-gradient(ellipse at 10% 15%, rgba(255,79,154,.12) 0%, transparent 50%),
        radial-gradient(ellipse at 90% 80%, rgba(0,229,255,.09)  0%, transparent 50%),
        radial-gradient(ellipse at 50% 50%, rgba(255,216,77,.04)  0%, transparent 60%);
    }
    .bg-layer::after {
      content: ''; position: absolute; inset: 0;
      background-image: radial-gradient(rgba(255,255,255,.06) 1px, transparent 1px);
      background-size: 30px 30px;
    }

    header {
      position: relative; z-index: 1;
      text-align: center; padding: 1.6rem 1rem .4rem;
    }
    header h1 {
      font-family: 'Fredoka One', cursive;
      font-size: clamp(1.9rem, 5vw, 3rem);
      color: var(--gold);
      text-shadow: 0 0 24px rgba(255,216,77,.4), 0 3px 0 rgba(0,0,0,.5);
    }
    .sub { margin-top: .25rem; color: var(--muted); font-weight: 700; font-size: .95rem; }

    .kyiv-bar {
      display: inline-flex; align-items: center; gap: .55rem;
      margin-top: .7rem;
      background: var(--surf); border: 1px solid rgba(0,229,255,.25);
      border-radius: 50px; padding: .4rem 1.1rem;
    }
    .kyiv-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--cyan); box-shadow: 0 0 6px var(--cyan);
      animation: blink 2s ease-in-out infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }
    .kyiv-label {
      font-size: .78rem; font-weight: 800; color: var(--muted);
      text-transform: uppercase; letter-spacing: .08em;
    }
    .kyiv-time {
      font-family: 'Fredoka One', cursive;
      font-size: 1.05rem; color: var(--cyan);
      letter-spacing: .04em; min-width: 74px; text-align: left;
    }

    main {
      position: relative; z-index: 1;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 1.25rem;
      max-width: 1080px;
      margin: 1.1rem auto 2rem;
      padding: 0 1rem;
      align-items: start;
    }
    @media (max-width: 820px) {
      main { grid-template-columns: 1fr; }
      .pw { order: 1; } .pi { order: 2; } .pr { order: 3; }
    }

    .panel {
      background: var(--surf);
      border: 1px solid var(--bord);
      border-radius: var(--radius);
      padding: 1.25rem;
    }
    .panel h2 {
      font-family: 'Fredoka One', cursive;
      font-size: 1.2rem; color: var(--gold); margin-bottom: .85rem;
    }

    .irow { display: flex; gap: .4rem; margin-bottom: .85rem; }
    .irow input {
      flex: 1; background: var(--surf2); border: 1.5px solid var(--bord);
      border-radius: 8px; color: var(--text);
      font-family: 'Nunito', sans-serif; font-size: .95rem; font-weight: 700;
      padding: .6rem .9rem; outline: none; transition: border-color .2s;
    }
    .irow input::placeholder { color: var(--muted); }
    .irow input:focus { border-color: var(--gold); box-shadow: 0 0 0 3px rgba(255,216,77,.12); }

    .nlist {
      list-style: none; display: flex; flex-direction: column;
      gap: .35rem; max-height: 260px; overflow-y: auto;
      scrollbar-width: thin; scrollbar-color: var(--surf2) transparent;
      padding-right: 3px;
    }
    .nlist li {
      display: flex; align-items: center; justify-content: space-between;
      background: var(--surf2); border-radius: 8px;
      padding: .45rem .7rem; font-weight: 700; font-size: .9rem;
      border-left: 4px solid var(--gold);
      animation: sli .18s ease;
    }
    @keyframes sli { from{opacity:0;transform:translateX(-8px)} to{opacity:1;transform:none} }
    .nlist li:nth-child(10n+1){border-left-color:#ff4757}
    .nlist li:nth-child(10n+2){border-left-color:#ff6b35}
    .nlist li:nth-child(10n+3){border-left-color:#ffd84d}
    .nlist li:nth-child(10n+4){border-left-color:#7bed9f}
    .nlist li:nth-child(10n+5){border-left-color:#2ed573}
    .nlist li:nth-child(10n+6){border-left-color:#1e90ff}
    .nlist li:nth-child(10n+7){border-left-color:#5352ed}
    .nlist li:nth-child(10n+8){border-left-color:#ff4fa3}
    .nlist li:nth-child(10n+9){border-left-color:#eccc68}
    .nlist li:nth-child(10n+0){border-left-color:#00e5ff}

    .rm {
      background: none; border: none; color: var(--muted);
      cursor: pointer; font-size: .95rem; padding: 0 .15rem;
      transition: color .15s; line-height: 1;
    }
    .rm:hover { color: var(--pink); }

    .pac { display: flex; align-items: center; justify-content: space-between; margin-top: .75rem; }
    .nc  { font-size: .82rem; color: var(--muted); font-weight: 700; }

    .pw {
      display: flex; flex-direction: column;
      align-items: center; gap: .65rem; padding: 1.5rem 1rem;
    }

    .ptr {
      font-size: 2.1rem; color: var(--gold);
      filter: drop-shadow(0 0 8px rgba(255,216,77,.6));
      margin-bottom: -12px; z-index: 2; position: relative;
      animation: pb 1.8s ease-in-out infinite;
    }
    body.spinning .ptr { animation: none; }
    @keyframes pb { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-5px)} }

    .ww {
      border-radius: 50%;
      box-shadow: 0 0 0 6px rgba(255,216,77,.22),
                  0 0 32px rgba(255,216,77,.14),
                  0 8px 40px rgba(0,0,0,.55);
      transition: box-shadow .4s;
    }
    body.spinning .ww {
      box-shadow: 0 0 0 6px rgba(255,79,154,.4),
                  0 0 44px rgba(255,79,154,.28),
                  0 8px 40px rgba(0,0,0,.55);
    }

    /* FIX: canvas sized purely via CSS — no DPI scaling hack that breaks redraws */
    canvas {
      display: block;
      border-radius: 50%;
      width: min(400px, 85vw);
      height: min(400px, 85vw);
    }

    .rb {
      border-radius: var(--radius); padding: 1.25rem 1rem; text-align: center;
      border: 2px dashed var(--bord); transition: border-color .4s, background .4s;
      margin-bottom: .85rem; min-height: 90px;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: .3rem;
    }
    .rb-e { background: var(--surf2); }
    .rb-w {
      background: linear-gradient(135deg, rgba(255,216,77,.1), rgba(255,79,154,.08));
      border-color: var(--gold);
      animation: wp 2s ease-in-out infinite;
    }
    @keyframes wp {
      0%,100%{box-shadow:0 0 0 0 rgba(255,216,77,0)}
      50%    {box-shadow:0 0 18px 5px rgba(255,216,77,.15)}
    }
    .rn {
      font-family: 'Fredoka One', cursive;
      font-size: clamp(1.5rem, 4vw, 2.2rem);
      color: var(--gold); text-shadow: 0 0 10px rgba(255,216,77,.35); word-break: break-word;
    }
    .rs { font-size: .82rem; color: var(--muted); font-weight: 700; }

    .hw h3 {
      font-family: 'Fredoka One', cursive;
      font-size: .95rem; color: var(--muted); margin-bottom: .45rem; margin-top: 1rem;
    }
    .hl {
      list-style: none; display: flex; flex-direction: column;
      gap: .28rem; max-height: 230px; overflow-y: auto;
    }
    .hl li {
      font-size: .85rem; font-weight: 700; color: var(--muted);
      padding: .3rem .55rem; background: var(--surf2);
      border-radius: 6px; display: flex; align-items: center; gap: .45rem;
    }
    .hl li::before { content: '🎯'; font-size: .75rem; flex-shrink: 0; }
    .hl .pick-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .hl .pick-ts {
      font-size: .72rem; color: var(--cyan); opacity: .8;
      font-weight: 700; white-space: nowrap; flex-shrink: 0; letter-spacing: .02em;
    }

    .cloud-section { margin-top: 1.2rem; }
    .cloud-section h3 {
      font-family: 'Fredoka One', cursive;
      font-size: .95rem; color: var(--cyan); margin-bottom: .45rem;
      display: flex; align-items: center; gap: .4rem;
    }
    .cloud-badge {
      font-size: .68rem; font-weight: 800;
      background: rgba(0,229,255,.15); color: var(--cyan);
      padding: .12rem .42rem; border-radius: 20px;
    }
    .cloud-list {
      list-style: none; display: flex; flex-direction: column;
      gap: .25rem; max-height: 220px; overflow-y: auto;
    }
    .cloud-list li {
      font-size: .85rem; font-weight: 700; color: var(--muted);
      padding: .3rem .55rem; background: var(--surf2);
      border-radius: 6px; display: flex; align-items: center; gap: .45rem;
    }
    .cloud-list li::before { content: '🌍'; font-size: .75rem; flex-shrink: 0; }
    .cloud-list .c-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .cloud-list .c-ts {
      font-size: .72rem; color: var(--cyan); opacity: .8;
      font-weight: 700; white-space: nowrap; flex-shrink: 0;
    }

    .btn {
      display: inline-flex; align-items: center; justify-content: center;
      gap: .35rem; border: none; border-radius: 8px; cursor: pointer;
      font-family: 'Nunito', sans-serif; font-weight: 800;
      transition: transform .12s, box-shadow .12s, opacity .2s;
    }
    .btn:disabled { opacity: .4; cursor: not-allowed; transform: none !important; }
    .btn:not(:disabled):active { transform: scale(.96); }

    .ba { background: var(--gold); color: #0f0c1a; font-size: .9rem; padding: .6rem 1rem; }
    .ba:not(:disabled):hover { background: var(--gold-d); box-shadow: 0 4px 12px rgba(255,216,77,.35); }

    .bg2 {
      background: var(--surf2); color: var(--muted); font-size: .82rem;
      padding: .45rem .85rem; border: 1px solid var(--bord);
    }
    .bg2:not(:disabled):hover { color: var(--text); background: #3a1f6a; }

    .bs {
      background: linear-gradient(135deg, var(--pink) 0%, #ff7b4a 100%);
      color: #fff; font-size: 1.05rem; padding: .8rem 2.2rem;
      border-radius: 50px; letter-spacing: .07em;
      box-shadow: 0 5px 18px rgba(255,79,154,.4);
      animation: sbp 2.4s ease-in-out infinite;
    }
    .bs:not(:disabled):hover { transform: translateY(-2px) scale(1.03); animation: none; }
    body.spinning .bs { animation: none; opacity: .7; }
    @keyframes sbp {
      0%,100%{box-shadow:0 5px 18px rgba(255,79,154,.4)}
      50%    {box-shadow:0 5px 28px rgba(255,79,154,.7)}
    }

    .modal-wrap {
      position: fixed; inset: 0; z-index: 100;
      display: flex; align-items: center; justify-content: center;
      background: rgba(8,2,18,.78); backdrop-filter: blur(5px);
      padding: 1rem; animation: fi .25s ease;
    }
    @keyframes fi { from{opacity:0} to{opacity:1} }
    .mc {
      background: var(--surf); border: 2px solid var(--gold); border-radius: 22px;
      padding: 2.2rem 1.75rem; text-align: center; position: relative;
      max-width: 360px; width: 100%;
      box-shadow: 0 0 50px rgba(255,216,77,.2), 0 16px 50px rgba(0,0,0,.5);
      animation: cp .38s cubic-bezier(.34,1.56,.64,1);
    }
    @keyframes cp { from{transform:scale(.7);opacity:0} to{transform:scale(1);opacity:1} }
    .me { font-size: 3rem; margin-bottom: .35rem; animation: bou 1s ease infinite; }
    @keyframes bou { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
    .ml { color: var(--muted); font-weight: 700; font-size: .9rem; margin-bottom: .25rem; }
    .mn {
      font-family: 'Fredoka One', cursive;
      font-size: clamp(1.8rem,7vw,2.7rem); color: var(--gold);
      text-shadow: 0 0 14px rgba(255,216,77,.45);
      margin-bottom: 1.2rem; word-break: break-word;
    }

    .cf { position: absolute; top: 0; left: 50%; transform: translateX(-50%); width:0; height:0; pointer-events:none; }
    .cf span {
      position: absolute; width: 8px; height: 8px; border-radius: 2px;
      animation: cff 1.1s ease-out forwards;
    }
    @keyframes cff {
      0%  {transform:translate(0,0) rotate(0deg);opacity:1}
      100%{transform:translate(var(--tx),var(--ty)) rotate(var(--rot));opacity:0}
    }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--surf2); border-radius: 10px; }
  </style>
</head>
<body>

<div class="bg-layer"></div>

<header>
  <style>
    .torture-wrap {
      position: relative;
      display: inline-block;
    }
    .torture-label {
      position: absolute;
      top: -1.18em;
      left: 55%;
      transform: translateX(-50%) rotate(-9deg);
      font-size: 0.27em;
      white-space: nowrap;
      font-family: 'Arial Black', 'Impact', sans-serif;
      font-weight: 900;
      letter-spacing: .09em;
      color: #cc0000;
      text-shadow:
        0 0 10px #ff0000,
        1px 1px 0 #5a0000,
        2px 2px 0 #5a0000,
        3px 3px 4px rgba(0,0,0,0.6);
      filter: drop-shadow(0 3px 5px rgba(160,0,0,0.8));
      z-index: 10;
      pointer-events: none;
      line-height: 1;
    }
    .torture-label svg {
      position: absolute;
      top: 100%;
      left: 0;
      width: 100%;
      overflow: visible;
      pointer-events: none;
    }
  </style>
  <h1>🎡 Spin the <span class="torture-wrap"><span class="torture-label">TORTURE
    <svg viewBox="0 0 120 28" xmlns="http://www.w3.org/2000/svg" height="28">
      <!-- drip 1 -->
      <path d="M12 0 Q11 8 10 14 Q9 20 11 26" stroke="#bb0000" stroke-width="3" fill="none" stroke-linecap="round"/>
      <ellipse cx="11" cy="27" rx="3" ry="1.8" fill="#bb0000"/>
      <!-- drip 2 -->
      <path d="M35 0 Q34 10 33 18 Q32 24 34 28" stroke="#990000" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <ellipse cx="33.5" cy="28" rx="2.5" ry="1.5" fill="#990000"/>
      <!-- drip 3 short -->
      <path d="M58 0 Q57.5 5 57 10 Q56.5 14 58 17" stroke="#cc0000" stroke-width="2" fill="none" stroke-linecap="round"/>
      <ellipse cx="57.5" cy="17.5" rx="2" ry="1.2" fill="#cc0000"/>
      <!-- drip 4 long -->
      <path d="M80 0 Q79 9 78 17 Q77 23 79 28" stroke="#aa0000" stroke-width="3" fill="none" stroke-linecap="round"/>
      <ellipse cx="78.5" cy="28.5" rx="3" ry="1.8" fill="#aa0000"/>
      <!-- drip 5 -->
      <path d="M105 0 Q104 6 103 12 Q102 16 104 20" stroke="#bb0000" stroke-width="2.2" fill="none" stroke-linecap="round"/>
      <ellipse cx="103.5" cy="20.5" rx="2.2" ry="1.3" fill="#bb0000"/>
    </svg>
  </span>Wheel!</span></h1>
  <p class="sub">Add names, give it a spin, gambling is the best.</p>
  <div class="kyiv-bar">
    <span class="kyiv-dot"></span>
    <span class="kyiv-label">Kyiv</span>
    <span class="kyiv-time" id="kyivClock">--:--:--</span>
  </div>
</header>

<main>

  <!-- LEFT: Name entry -->
  <section class="panel pi">
    <h2>Add Names</h2>
    <div class="irow">
      <input id="ni" type="text" placeholder="Enter a name…" maxlength="30" autocomplete="off"/>
      <button class="btn ba" id="addB">Add</button>
    </div>
    <ul class="nlist" id="nl"></ul>
    <div class="pac">
      <!-- FIX: removed disabled attribute from initial HTML so it can always be clicked -->
      <button class="btn bg2" id="clrB">🗑 Clear all</button>
      <span class="nc" id="nc">0 names</span>
    </div>
  </section>

  <!-- CENTRE: Wheel -->
  <section class="panel pw">
    <div class="ptr" id="ptr">▼</div>
    <div class="ww">
      <!-- FIX: canvas internal resolution set large once in JS; CSS handles display size -->
      <canvas id="wc"></canvas>
    </div>
    <button class="btn bs" id="spinB"><span id="sl">SPIN!</span></button>
  </section>

  <!-- RIGHT: Result + Recent picks + Firebase feed -->
  <section class="panel pr">
    <h2>Result</h2>

    <div class="rb rb-e" id="rb">
      <span class="rn" id="rn">—</span>
      <span class="rs" id="rs">Spin to reveal a winner!</span>
    </div>

    <button class="btn bg2" id="saB" style="display:none;width:100%;margin-bottom:.5rem">🔄 Spin again</button>

    <div class="hw">
      <h3>Recent picks</h3>
      <ol class="hl" id="hl" reversed></ol>
    </div>

    <div class="cloud-section">
      <h3>Live results <span class="cloud-badge">LIVE</span></h3>
      <ul class="cloud-list" id="cloudList">
        <li style="display:none"></li>
      </ul>
    </div>
  </section>
</main>

<!-- Winner modal -->
<div id="modal" style="display:none">
  <div class="modal-wrap" id="mw">
    <div class="mc">
      <div class="cf" id="cf"></div>
      <p class="me">🎉</p>
      <p class="ml">The wheel chose…</p>
      <p class="mn" id="mn"></p>
      <button class="btn bs" id="mcB" style="font-size:.95rem;padding:.7rem 1.8rem;animation:none">Awesome!</button>
    </div>
  </div>
</div>

<script>
/* ── Constants ──────────────────────────────────────────── */
const COLORS   = ['#ff4757','#ff6b35','#ffd84d','#7bed9f','#2ed573',
                  '#1e90ff','#5352ed','#ff4fa3','#eccc68','#00e5ff'];
const DEFAULTS = ['Alice','Bob','Charlie','Diana','Eve'];
const LS_N     = 'sw_names';
const LS_H     = 'sw_hist';
const SPIN_DUR = 3000;
const MAX_HIST = 10;

/* ── State ──────────────────────────────────────────────── */
let names    = [];
let history  = [];
let spinning = false;
let angle    = 0;

/* ── DOM refs ───────────────────────────────────────────── */
const can    = document.getElementById('wc');
const ctx    = can.getContext('2d');
const ni     = document.getElementById('ni');
const addB   = document.getElementById('addB');
const nl     = document.getElementById('nl');
const nc     = document.getElementById('nc');
const clrB   = document.getElementById('clrB');
const spinB  = document.getElementById('spinB');
const sl     = document.getElementById('sl');
const saB    = document.getElementById('saB');
const rb     = document.getElementById('rb');
const rn     = document.getElementById('rn');
const rs     = document.getElementById('rs');
const hl     = document.getElementById('hl');
const modal  = document.getElementById('modal');
const mn     = document.getElementById('mn');
const mcB    = document.getElementById('mcB');
const mw     = document.getElementById('mw');
const cf     = document.getElementById('cf');
const clist  = document.getElementById('cloudList');
const kyivEl = document.getElementById('kyivClock');

/* ── FIX: Canvas setup — set a fixed internal resolution once.
   CSS (width: min(400px, 85vw)) handles display scaling.
   No ctx.scale() calls — avoids the stacking-transform bug that
   caused the wheel to be drawn far outside the visible area.    ── */
const CANVAS_SIZE = 800; // high-res backing store
can.width  = CANVAS_SIZE;
can.height = CANVAS_SIZE;

/* ── Kyiv clock ─────────────────────────────────────────── */
function toKyivTime(tsMs) {
  return new Date(tsMs).toLocaleTimeString('uk-UA', {
    timeZone: 'Europe/Kiev',
    hour:     '2-digit',
    minute:   '2-digit',
    second:   '2-digit',
    hour12:   false
  });
}
function tickClock() { kyivEl.textContent = toKyivTime(Date.now()); }
tickClock();
setInterval(tickClock, 1000);

/* ── Persistence ────────────────────────────────────────── */
function save() {
  localStorage.setItem(LS_N, JSON.stringify(names));
  localStorage.setItem(LS_H, JSON.stringify(history));
}

/* ── Name management ────────────────────────────────────── */
function addName() {
  const v = ni.value.trim();
  if (!v) return;
  names.push(v); ni.value = ''; ni.focus();
  save(); renderList(); draw();
}
function removeName(i) {
  names.splice(i, 1); save(); renderList(); draw();
}

/* FIX: clearNames — removed confirm() (can be blocked by browsers/extensions)
   and removed the names.length guard so the button always responds visually.
   Names are cleared immediately when clicked.                               */
function clearNames() {
  if (!names.length) return;
  names = [];
  save();
  renderList();
  draw();
  resetRes();
}

function renderList() {
  nl.innerHTML = '';
  names.forEach((name, i) => {
    const li = document.createElement('li');
    const t  = document.createElement('span'); t.textContent = name;
    const b  = document.createElement('button');
    b.className = 'rm'; b.textContent = '✕';
    b.setAttribute('aria-label', 'Remove ' + name);
    b.onclick = () => removeName(i);
    li.append(t, b); nl.appendChild(li);
  });
  nc.textContent = names.length + ' ' + (names.length === 1 ? 'name' : 'names');
  spinB.disabled = names.length < 2;
  /* FIX: never disable the clear button via JS — let clearNames() handle the
     empty-list case gracefully instead of leaving the button visually broken. */
  sl.textContent = names.length < 2 ? 'Add 2+ names' : 'SPIN!';
}

/* ── History ────────────────────────────────────────────── */
function addHist(name) {
  history.unshift({ name, ts: Date.now() });
  if (history.length > MAX_HIST) history.length = MAX_HIST;
  save(); renderHist();
}
function renderHist() {
  hl.innerHTML = '';
  history.forEach(entry => {
    const li = document.createElement('li');
    const ns = document.createElement('span');
    ns.className = 'pick-name';
    ns.textContent = entry.name;
    const ts = document.createElement('span');
    ts.className = 'pick-ts';
    ts.textContent = entry.ts ? toKyivTime(entry.ts) : '';
    li.append(ns, ts);
    hl.appendChild(li);
  });
}

/* ── Result display ─────────────────────────────────────── */
function showRes(name) {
  rn.textContent = name; rs.textContent = '🎉 Congratulations!';
  rb.className = 'rb rb-w'; saB.style.display = '';
}
function resetRes() {
  rn.textContent = '—'; rs.textContent = 'Spin to reveal a winner!';
  rb.className = 'rb rb-e'; saB.style.display = 'none';
}

/* ── Firebase live cloud renderer ───────────────────────── */
window._fbRenderCloud = function(list) {
  clist.innerHTML = '';
  list.forEach(item => {
    const li = document.createElement('li');
    const ns = document.createElement('span'); ns.className = 'c-name'; ns.textContent = item.name;
    const ts = document.createElement('span'); ts.className = 'c-ts';
    ts.textContent = item.timestamp ? toKyivTime(item.timestamp) : '';
    li.append(ns, ts);
    clist.appendChild(li);
  });
};

/* ── Canvas drawing ─────────────────────────────────────── */
function draw() {
  const S  = CANVAS_SIZE;
  const cx = S / 2, cy = S / 2, r = cx - 4;
  ctx.clearRect(0, 0, S, S);

  if (!names.length) {
    ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.fillStyle = '#1e1133'; ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,.08)'; ctx.lineWidth = 3; ctx.stroke();
    ctx.font = 'bold 26px Nunito,sans-serif';
    ctx.fillStyle = 'rgba(255,255,255,.25)';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('Add names to get started!', cx, cy);
    return;
  }

  const seg = (Math.PI * 2) / names.length;

  names.forEach((name, i) => {
    const sa = angle + i * seg, ea = sa + seg;

    // Vibrant segment fill with a subtle inner glow
    ctx.beginPath(); ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, r, sa, ea); ctx.closePath();
    ctx.fillStyle = COLORS[i % COLORS.length];
    ctx.fill();

    // Bright white dividers so slices are crisp even while spinning
    ctx.strokeStyle = 'rgba(255,255,255,.55)';
    ctx.lineWidth = 3;
    ctx.stroke();

    // Label — draw rotated, centred in the slice at ~70% radius
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(sa + seg / 2);

    const labelRadius = r * 0.68;
    const arcWidth    = labelRadius * seg;
    const maxChars    = Math.max(3, Math.floor(arcWidth / 18));
    const lbl = name.length > maxChars ? name.slice(0, maxChars - 1) + '\u2026' : name;

    let fs = names.length <= 4 ? 52
           : names.length <= 6 ? 44
           : names.length <= 8 ? 36
           : names.length <= 12 ? 30
           : 24;
    if (lbl.length > 8)  fs = Math.round(fs * 0.82);
    if (lbl.length > 11) fs = Math.round(fs * 0.82);

    ctx.font = '900 ' + fs + 'px Nunito,sans-serif';
    ctx.fillStyle = '#fff';
    ctx.textBaseline = 'middle';
    ctx.textAlign = 'center';
    ctx.shadowColor = 'rgba(0,0,0,.75)';
    ctx.shadowBlur = 8;
    ctx.fillText(lbl, labelRadius, 0);
    ctx.restore();
  });

  // Outer ring — thick and vivid
  ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(255,255,255,.35)';
  ctx.lineWidth = 6;
  ctx.stroke();

  // Centre hub
  const hub = 38;
  const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, hub);
  g.addColorStop(0, '#ffffff');
  g.addColorStop(1, '#d0b0ff');
  ctx.beginPath(); ctx.arc(cx, cy, hub, 0, Math.PI * 2);
  ctx.fillStyle = g;
  ctx.shadowColor = 'rgba(0,0,0,.5)';
  ctx.shadowBlur = 14;
  ctx.fill();
  ctx.shadowBlur = 0;
  ctx.strokeStyle = 'rgba(0,0,0,.25)';
  ctx.lineWidth = 3;
  ctx.stroke();
}

/* ── Winner detection ───────────────────────────────────── */
function winnerIdx() {
  const seg = (Math.PI * 2) / names.length;
  const pa  = Math.PI * 1.5;
  const a   = ((pa - angle) % (Math.PI * 2) + Math.PI * 2) % (Math.PI * 2);
  return Math.floor(a / seg) % names.length;
}

/* ── Spin ───────────────────────────────────────────────── */
function spin() {
  if (spinning || names.length < 2) return;
  spinning = true;
  spinB.disabled = true;
  document.body.classList.add('spinning');

  const totalRot   = (6 + Math.random() * 4) * Math.PI * 2;
  const startAngle = angle;
  const t0         = performance.now();

  function ease(t) { return 1 - Math.pow(1 - t, 3); }

  function frame(now) {
    const elapsed  = now - t0;
    const progress = Math.min(elapsed / SPIN_DUR, 1);
    angle = startAngle + totalRot * ease(progress);
    draw();

    if (progress < 1) {
      requestAnimationFrame(frame);
    } else {
      spinning = false;
      document.body.classList.remove('spinning');
      const wn = names[winnerIdx()];
      showRes(wn);
      addHist(wn);
      showModal(wn);
      if (typeof window._fbSaveResult === 'function') window._fbSaveResult(wn);
      spinB.disabled = false;
    }
  }

  requestAnimationFrame(frame);
}

/* ── Modal ──────────────────────────────────────────────── */
function showModal(name) {
  mn.textContent = name;
  modal.style.display = 'block';
  cf.innerHTML = '';
  const cols = ['#ffd84d','#ff4f9a','#00e5ff','#7bed9f','#ff6b35','#5352ed'];
  for (let i = 0; i < 24; i++) {
    const el  = document.createElement('span');
    const ang = (Math.random() * 180 - 90) * Math.PI / 180;
    const d   = 80 + Math.random() * 110;
    el.style.cssText =
      `background:${cols[i % cols.length]};` +
      `--tx:${Math.round(Math.sin(ang) * d)}px;` +
      `--ty:${-Math.round(Math.cos(ang) * d) - 15}px;` +
      `--rot:${Math.round(Math.random() * 720 - 360)}deg;` +
      `animation-delay:${(Math.random() * .3).toFixed(2)}s;` +
      `border-radius:${Math.random() > .5 ? '50%' : '2px'}`;
    cf.appendChild(el);
  }
}
function hideModal() { modal.style.display = 'none'; cf.innerHTML = ''; }

/* ── Events ─────────────────────────────────────────────── */
addB.onclick  = addName;
ni.addEventListener('keydown', e => { if (e.key === 'Enter') addName(); });
clrB.onclick  = clearNames;   // FIX: always fires — no disabled attribute on button
spinB.onclick = spin;
saB.onclick   = spin;
mcB.onclick   = hideModal;
mw.addEventListener('click', e => { if (e.target === mw) hideModal(); });
document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && modal.style.display !== 'none') hideModal();
});

/* ── Boot ───────────────────────────────────────────────── */
(function init() {
  const sn = localStorage.getItem(LS_N);
  const sh = localStorage.getItem(LS_H);
  names = sn ? JSON.parse(sn) : [...DEFAULTS];
  if (sh) {
    const raw = JSON.parse(sh);
    history = raw.map(e => typeof e === 'string' ? { name: e, ts: null } : e)
                 .slice(0, MAX_HIST);
  }
  renderList();
  renderHist();
  draw(); // initial paint — no resize() call needed, canvas is already sized
})();
</script>
